<!DOCTYPE html>

<head>

    <title>AgroConecta - Agrinho 2026</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>

        <nav>
            <a href="#produtores">Produtores</a>

            </section>

    <footer>
